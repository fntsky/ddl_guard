basePath: /api/v1
definitions:
  handler.resp:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  schema.ChangePasswordReq:
    properties:
      code:
        example: "123456"
        type: string
      new_password:
        example: newpassword123
        minLength: 6
        type: string
      target:
        example: user@example.com
        type: string
      type:
        enum:
        - email
        example: email
        type: string
    required:
    - code
    - new_password
    - target
    - type
    type: object
  schema.CreateDraftInput:
    properties:
      deadline:
        example: "2026-03-24T14:30:00+08:00"
        format: date-time
        type: string
      description:
        example: from swagger
        type: string
      early_remind:
        example: 30
        type: integer
      title:
        example: test ddl
        type: string
    type: object
  schema.CreateDraftReq:
    properties:
      data_type:
        default: default
        example: default
        type: string
      draft:
        $ref: '#/definitions/schema.CreateDraftInput'
      raw_base64:
        example: iVBORw0KGgoAAAANSUhEUgAA...
        type: string
    type: object
  schema.CreateDraftResp:
    properties:
      deadline:
        example: "2026-03-24T14:30:00+08:00"
        format: date-time
        type: string
      description:
        example: from swagger
        type: string
      early_remind:
        example: 30
        type: integer
      title:
        example: test ddl
        type: string
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
  schema.LoginByEmailReq:
    properties:
      email:
        example: testuser@example.com
        type: string
      password:
        example: password123
        type: string
    required:
    - email
    - password
    type: object
  schema.LoginByEmailResp:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      username:
        example: testuser
        type: string
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
  schema.RefreshTokenReq:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  schema.RegisterUserByEmailReq:
    properties:
      code:
        example: "123456"
        type: string
      email:
        example: testuser@example.com
        type: string
      password:
        example: password123
        minLength: 6
        type: string
      username:
        example: testuser
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  schema.RegisterUserByEmailResp:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
  schema.SendEmailVerificationCodeReq:
    properties:
      email:
        example: testuser@example.com
        type: string
    required:
    - email
    type: object
  schema.SendPasswordResetCodeReq:
    properties:
      target:
        example: user@example.com
        type: string
      type:
        enum:
        - email
        example: email
        type: string
    required:
    - target
    - type
    type: object
  schema.TokenPairResp:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  schema.UpdateDraftStatusReq:
    properties:
      status:
        example: active
        type: string
    required:
    - status
    type: object
  schema.UpdateDraftStatusResp:
    properties:
      status:
        example: 1
        type: integer
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
info:
  contact: {}
  description: This is a DDL Guard server API.
  termsOfService: http://swagger.io/terms/
  title: DDL Guard API
  version: "1.0"
paths:
  /auth/refresh-tokens:
    post:
      consumes:
      - application/json
      description: 使用refresh token换取新的access token和refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.TokenPairResp'
              type: object
      summary: 刷新Token
      tags:
      - Auth
  /ddl/draft:
    post:
      consumes:
      - application/json
      description: 创建DDL草稿
      parameters:
      - description: Create Draft Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.CreateDraftReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.CreateDraftResp'
              type: object
      summary: 创建DDL草稿
      tags:
      - DDL
  /ddl/drafts/{uuid}:
    patch:
      consumes:
      - application/json
      description: 将草稿状态从draft变更为active
      parameters:
      - description: Draft UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update Draft Status Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.UpdateDraftStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.UpdateDraftStatusResp'
              type: object
      summary: 同意DDL草稿
      tags:
      - DDL
  /users/email/verification-codes:
    post:
      consumes:
      - application/json
      description: 发送邮箱验证码用于注册
      parameters:
      - description: Send Email Verification Code Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.SendEmailVerificationCodeReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/handler.resp'
      summary: 发送邮箱验证码
      tags:
      - User
  /users/password:
    put:
      consumes:
      - application/json
      description: |-
        使用验证码验证身份后修改用户密码。验证码通过 SendPasswordResetCode 接口发送。
        type: 验证方式，需与发送验证码时的类型一致，目前支持 "email"
        target: 验证目标，需与发送验证码时的目标一致
        code: 收到的验证码，6 位数字
        new_password: 新密码，最少 6 个字符
      parameters:
      - description: 修改密码请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/handler.resp'
        "400":
          description: 请求参数错误或验证码无效
          schema:
            $ref: '#/definitions/handler.resp'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/handler.resp'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.resp'
      summary: 通过验证码修改密码
      tags:
      - User
  /users/password/reset-codes:
    post:
      consumes:
      - application/json
      description: |-
        根据指定的验证类型发送验证码到目标地址。目前支持 email 类型，验证码有效期为 5 分钟。
        type: 验证方式，目前支持 "email"
        target: 验证目标，邮箱类型时为邮箱地址
      parameters:
      - description: 发送密码重置验证码请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.SendPasswordResetCodeReq'
      produces:
      - application/json
      responses:
        "200":
          description: 验证码发送成功
          schema:
            $ref: '#/definitions/handler.resp'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.resp'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.resp'
      summary: 发送密码重置验证码
      tags:
      - User
  /users/registrations/email:
    post:
      consumes:
      - application/json
      description: 使用邮箱验证码注册用户
      parameters:
      - description: Register User By Email Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.RegisterUserByEmailReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.RegisterUserByEmailResp'
              type: object
      summary: 邮箱注册
      tags:
      - User
  /users/sessions/email:
    post:
      consumes:
      - application/json
      description: 使用邮箱和密码登录
      parameters:
      - description: Login By Email Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.LoginByEmailReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.LoginByEmailResp'
              type: object
      summary: 邮箱登录
      tags:
      - User
swagger: "2.0"
