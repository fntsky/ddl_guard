info:
  contact: {}
  description: This is a DDL Guard server API.
  termsOfService: http://swagger.io/terms/
  title: DDL Guard API
  version: "1.0"
paths:
  /api/v1/auth/refresh-tokens:
    post:
      consumes:
      - application/json
      description: 使用refresh token换取新的access token和refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.TokenPairResp'
              type: object
      summary: 刷新Token
      tags:
      - Auth
  /api/v1/ddl/{uuid}:
    delete:
      consumes:
      - application/json
      description: 删除DDL（软删除）
      parameters:
      - description: DDL UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/handler.resp'
      security:
      - BearerAuth: []
      summary: 删除DDL
      tags:
      - DDL
    get:
      consumes:
      - application/json
      description: 获取单个DDL的详细信息
      parameters:
      - description: DDL UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.DDLDetailResp'
              type: object
      security:
      - BearerAuth: []
      summary: 获取DDL详情
      tags:
      - DDL
    put:
      consumes:
      - application/json
      description: 修改DDL的标题、描述、截止时间或提前提醒时间
      parameters:
      - description: DDL UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update DDL Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.UpdateDDLReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.UpdateDDLResp'
              type: object
      security:
      - BearerAuth: []
      summary: 修改DDL
      tags:
      - DDL
  /api/v1/ddl/active:
    get:
      consumes:
      - application/json
      description: 分页获取用户所有激活状态的DDL
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.DDLListResp'
              type: object
      security:
      - BearerAuth: []
      summary: 获取激活状态的DDL列表
      tags:
      - DDL
  /api/v1/ddl/draft:
    post:
      consumes:
      - application/json
      description: 创建DDL草稿
      parameters:
      - description: Create Draft Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.CreateDraftReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.CreateDraftResp'
              type: object
      security:
      - BearerAuth: []
      summary: 创建DDL草稿
      tags:
      - DDL
  /api/v1/ddl/drafts/{uuid}:
    patch:
      consumes:
      - application/json
      description: 将草稿状态从draft变更为active
      parameters:
      - description: Draft UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update Draft Status Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.UpdateDraftStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.UpdateDraftStatusResp'
              type: object
      security:
      - BearerAuth: []
      summary: 同意DDL草稿
      tags:
      - DDL
  /api/v1/ddl/expired:
    get:
      consumes:
      - application/json
      description: 分页获取用户所有过期状态的DDL
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.DDLListResp'
              type: object
      security:
      - BearerAuth: []
      summary: 获取过期状态的DDL列表
      tags:
      - DDL
  /api/v1/exams:
    get:
      consumes:
      - application/json
      description: 分页获取用户所有考试
      parameters:
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.ExamListResp'
              type: object
      security:
      - BearerAuth: []
      summary: 获取考试列表
      tags:
      - Exam
    post:
      consumes:
      - application/json
      description: 创建一个新的考试
      parameters:
      - description: Create Exam Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.CreateExamReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.CreateExamResp'
              type: object
      security:
      - BearerAuth: []
      summary: 创建考试
      tags:
      - Exam
  /api/v1/exams/{uuid}:
    delete:
      consumes:
      - application/json
      description: 删除考试
      parameters:
      - description: Exam UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/handler.resp'
      security:
      - BearerAuth: []
      summary: 删除考试
      tags:
      - Exam
    get:
      consumes:
      - application/json
      description: 获取单个考试的详细信息
      parameters:
      - description: Exam UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.ExamDetailResp'
              type: object
      security:
      - BearerAuth: []
      summary: 获取考试详情
      tags:
      - Exam
    put:
      consumes:
      - application/json
      description: 更新考试的信息
      parameters:
      - description: Exam UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update Exam Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.UpdateExamReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/schema.UpdateExamResp'
              type: object
      security:
      - BearerAuth: []
      summary: 更新考试
      tags:
      - Exam
  /api/v1/users/email/verification-codes:
    post:
      consumes:
      - application/json
      description: 发送邮箱验证码用于注册
      parameters:
      - description: Send Email Verification Code Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.SendEmailVerificationCodeReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/handler.resp'
      summary: 发送邮箱验证码
      tags:
      - User
  /api/v1/users/password:
    put:
      consumes:
      - application/json
      description: |-
        使用验证码验证身份后修改用户密码。验证码通过 SendPasswordResetCode 接口发送。
        type: 验证方式，需与发送验证码时的类型一致，目前支持 "email"
        target: 验证目标，需与发送验证码时的目标一致
        code: 收到的验证码，6 位数字
        new_password: 新密码，最少 6 个字符
      parameters:
      - description: 修改密码请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/handler.resp'
        "400":
          description: 请求参数错误或验证码无效
          schema:
            $ref: '#/definitions/handler.resp'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/handler.resp'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.resp'
      summary: 通过验证码修改密码
      tags:
      - User
  /api/v1/users/password/reset-codes:
    post:
      consumes:
      - application/json
      description: |-
        根据指定的验证类型发送验证码到目标地址。目前支持 email 类型，验证码有效期为 5 分钟。
        type: 验证方式，目前支持 "email"
        target: 验证目标，邮箱类型时为邮箱地址
      parameters:
      - description: 发送密码重置验证码请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.SendPasswordResetCodeReq'
      produces:
      - application/json
      responses:
        "200":
          description: 验证码发送成功
          schema:
            $ref: '#/definitions/handler.resp'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/handler.resp'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.resp'
      summary: 发送密码重置验证码
      tags:
      - User
  /api/v1/users/registrations/email:
