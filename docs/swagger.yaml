basePath: /api/v1
definitions:
  github_com_fntsky_ddl_guard_internal_base_handler.resp:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  github_com_fntsky_ddl_guard_internal_schema.CreateDraftInput:
    properties:
      deadline:
        example: "2026-03-24T14:30:00+08:00"
        format: date-time
        type: string
      description:
        example: from swagger
        type: string
      early_remind:
        example: 30
        type: integer
      title:
        example: test ddl
        type: string
    type: object
  github_com_fntsky_ddl_guard_internal_schema.CreateDraftReq:
    properties:
      data_type:
        default: default
        example: default
        type: string
      draft:
        $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.CreateDraftInput'
      raw_base64:
        example: iVBORw0KGgoAAAANSUhEUgAA...
        type: string
    type: object
  github_com_fntsky_ddl_guard_internal_schema.CreateDraftResp:
    properties:
      deadline:
        example: "2026-03-24T14:30:00+08:00"
        format: date-time
        type: string
      description:
        example: from swagger
        type: string
      early_remind:
        example: 30
        type: integer
      title:
        example: test ddl
        type: string
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
  github_com_fntsky_ddl_guard_internal_schema.RefreshTokenReq:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_fntsky_ddl_guard_internal_schema.RegisterUserByEmailReq:
    properties:
      code:
        example: "123456"
        type: string
      email:
        example: testuser@example.com
        type: string
      password:
        example: password123
        minLength: 6
        type: string
      username:
        example: testuser
        type: string
    required:
    - code
    - email
    - password
    - username
    type: object
  github_com_fntsky_ddl_guard_internal_schema.RegisterUserByEmailResp:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
  github_com_fntsky_ddl_guard_internal_schema.SendEmailVerificationCodeReq:
    properties:
      email:
        example: testuser@example.com
        type: string
    required:
    - email
    type: object
  github_com_fntsky_ddl_guard_internal_schema.TokenPairResp:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      refresh_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    type: object
  github_com_fntsky_ddl_guard_internal_schema.UpdateDraftStatusReq:
    properties:
      status:
        example: active
        type: string
    required:
    - status
    type: object
  github_com_fntsky_ddl_guard_internal_schema.UpdateDraftStatusResp:
    properties:
      status:
        example: 1
        type: integer
      uuid:
        example: 7a178766-4b8e-4e99-ab4c-843f7dbd95fd
        type: string
    type: object
info:
  contact: {}
  description: This is a DDL Guard server API.
  termsOfService: http://swagger.io/terms/
  title: DDL Guard API
  version: "1.0"
paths:
  /auth/refresh-tokens:
    post:
      consumes:
      - application/json
      description: 使用refresh token换取新的access token和refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_base_handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.TokenPairResp'
              type: object
      summary: 刷新Token
      tags:
      - Auth
  /ddl/draft:
    post:
      consumes:
      - application/json
      description: 创建DDL草稿
      parameters:
      - description: Create Draft Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.CreateDraftReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_base_handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.CreateDraftResp'
              type: object
      summary: 创建DDL草稿
      tags:
      - DDL
  /ddl/drafts/{uuid}:
    patch:
      consumes:
      - application/json
      description: 将草稿状态从draft变更为active
      parameters:
      - description: Draft UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update Draft Status Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.UpdateDraftStatusReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_base_handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.UpdateDraftStatusResp'
              type: object
      summary: 同意DDL草稿
      tags:
      - DDL
  /users/email/verification-codes:
    post:
      consumes:
      - application/json
      description: 发送邮箱验证码用于注册
      parameters:
      - description: Send Email Verification Code Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.SendEmailVerificationCodeReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_base_handler.resp'
      summary: 发送邮箱验证码
      tags:
      - User
  /users/registrations/email:
    post:
      consumes:
      - application/json
      description: 使用邮箱验证码注册用户
      parameters:
      - description: Register User By Email Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.RegisterUserByEmailReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_base_handler.resp'
            - properties:
                data:
                  $ref: '#/definitions/github_com_fntsky_ddl_guard_internal_schema.RegisterUserByEmailResp'
              type: object
      summary: 邮箱注册
      tags:
      - User
swagger: "2.0"
