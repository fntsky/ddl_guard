info:
  contact: {}
  description: This is a DDL Guard server API.
  termsOfService: http://swagger.io/terms/
  title: DDL Guard API
  version: "1.0"
paths:
  /api/v1/auth/refresh-tokens:
    post:
      consumes:
      - application/json
      description: 使用refresh token换取新的access token和refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.RefreshTokenReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/schema.TokenPairResp'
              type: object
      summary: 刷新Token
      tags:
      - Auth
  /api/v1/daily-scores/{uuid}:
    delete:
      consumes:
      - application/json
      description: 删除平时成绩
      parameters:
      - description: Daily Score UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            $ref: '#/definitions/handler.Response'
      security:
      - BearerAuth: []
      summary: 删除平时成绩
      tags:
      - DailyScore
    put:
      consumes:
      - application/json
      description: 更新平时成绩的信息
      parameters:
      - description: Daily Score UUID
        in: path
        name: uuid
        required: true
        type: string
      - description: Update Daily Score Request
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.UpdateDailyScoreReq'
      produces:
      - application/json
      responses:
        "200":
          description: success
          schema:
            allOf:
            - $ref: '#/definitions/handler.Response'
            - properties:
                data:
                  $ref: '#/definitions/schema.UpdateDailyScoreResp'
              type: object
      security:
      - BearerAuth: []
      summary: 更新平时成绩
      tags:
      - DailyScore
  /api/v1/ddl/{uuid}:
    delete:
      consumes:
      - application/json
      description: 删除DDL（软删除）
      parameters:
      - description: DDL UUID
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: success
