      - application/json
      description: |-
        使用验证码验证身份后修改用户密码。验证码通过 SendPasswordResetCode 接口发送。
        type: 验证方式，需与发送验证码时的类型一致，目前支持 "email", "phone"
        target: 验证目标，需与发送验证码时的目标一致
        code: 收到的验证码，6 位数字
        new_password: 新密码，最少 6 个字符
      parameters:
      - description: 修改密码请求
        in: body
        name: req
        required: true
        schema:
          $ref: '#/definitions/schema.ChangePasswordReq'
      produces:
      - application/json
      responses:
        "200":
          description: 密码修改成功
          schema:
            $ref: '#/definitions/handler.Response'
        "400":
          description: 请求参数错误或验证码无效
          schema:
            $ref: '#/definitions/handler.Response'
        "404":
          description: 用户不存在
          schema:
            $ref: '#/definitions/handler.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/handler.Response'
      summary: 通过验证码修改密码
      tags:
      - User
